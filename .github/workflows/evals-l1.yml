name: evals · L1 (contract checks)

# Runs the L1 deterministic contract checks on every PR and push to main.
# No API key, no cost — safe to require as a branch-protection check.
# L2 (behavioral, LLM-in-the-loop) lives in evals-l2.yml. See scripts/eval/README.md.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  l1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # No install step — the harness is zero-dependency (node builtins + bash).
      - name: L1 contract checks
        run: node scripts/eval/l1.mjs
