name: evals · L2 (behavioral)

# Behavioral evals: do the skills make the right runtime decisions?
# Suites: tier-routing, bug-class, complexity-triage, aw-should-trigger.
# Each runs a model, so this needs a secret and costs a few tokens. To keep it
# cheap and relevant it runs ONLY when a rubric/golden file changes (or on manual
# dispatch).
#
# Setup (one-time): add an ANTHROPIC_API_KEY repository secret
#   (Settings → Secrets and variables → Actions → New repository secret).
# Without the secret the job still runs and passes — the script skips cleanly —
# so this is safe to require as a check and safe for fork PRs.

on:
  pull_request:
    paths:
      # rubric sources (read live by the eval)
      - "skills/workflow/autonomous-workflow/templates/dispatcher.template.md"
      - "skills/workflow/autonomous-workflow/templates/routing-rule.template.md"
      - "skills/workflow/autonomous-workflow/SKILL.md"
      - "skills/workflow/autonomous-workflow/rules/phase-0-validation.md"
      - "skills/workflow/fix-bug/SKILL.md"
      # eval harness + golden sets
      - "scripts/eval/l2.mjs"
      - "scripts/eval/lib.mjs"
      - "scripts/eval/golden/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  l2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: L2 behavioral evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Conservative catastrophic floor, applied per suite. A healthy rubric
          # scores ~90%+; 70% only trips on a badly-broken rubric, not 1–2 cases
          # of model noise on these < 50-case sets. Tighten (or move to
          # 0%-regression-vs-baseline) once a golden set reaches ≥ 50 — see
          # scripts/eval/README.md.
          EVAL_GATE: "70"
        run: node scripts/eval/l2.mjs
