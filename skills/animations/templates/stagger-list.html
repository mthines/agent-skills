<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Staggered List</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: hsl(220 14% 8%);
    font-family: system-ui, sans-serif;
    color: white;
  }

  .reveal-list {
    --stagger: 60ms;
    --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
    list-style: none;
    padding: 0;
    margin: 0;
    display: grid;
    gap: 0.5rem;
  }

  .reveal-list > li {
    padding: 0.75rem 1rem;
    border: 1px solid hsl(220 14% 28%);
    border-radius: 0.5rem;
    background: hsl(220 14% 14%);
    opacity: 0;
    transform: translateY(8px);
    animation: rise 320ms var(--ease) forwards;
    animation-delay: calc(var(--i) * var(--stagger));
  }

  @keyframes rise {
    to { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .reveal-list > li {
      transform: none;
      animation: fade 160ms linear forwards;
      animation-delay: 0ms;
    }
    @keyframes fade { to { opacity: 1; } }
  }
</style>
</head>
<body>
  <ul class="reveal-list">
    <li style="--i: 0">Item one</li>
    <li style="--i: 1">Item two</li>
    <li style="--i: 2">Item three</li>
    <li style="--i: 3">Item four</li>
    <li style="--i: 4">Item five</li>
  </ul>
</body>
</html>
